<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: deep navy -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>

  <!-- Cyan accent bar — top edge -->
  <rect x="0" y="0" width="32" height="2.5" rx="1" fill="#06b6d4" filter="url(#glow)"/>

  <!--
    Geometric M: two uprights + a precise chevron valley
    Centered in the tile, bold and sharp.
  -->
  <!-- Left upright -->
  <rect x="5"  y="9" width="3.5" height="15" rx="0.6" fill="#e2e8f0"/>
  <!-- Right upright -->
  <rect x="23.5" y="9" width="3.5" height="15" rx="0.6" fill="#e2e8f0"/>
  <!-- Left diagonal (down to center valley) -->
  <polygon points="5,9 8.5,9 16,19 13,19" fill="#e2e8f0"/>
  <!-- Right diagonal (up from center valley) -->
  <polygon points="19,19 27,9 23.5,9 16,19" fill="#e2e8f0"/>
</svg>
