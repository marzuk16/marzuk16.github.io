name: Deploy portfolio to GitHub Pages

# Which design goes live is controlled by the ACTIVE_DESIGN repository variable
# (Settings -> Secrets and variables -> Actions -> Variables). Valid values: ink | tech.
# Changing the variable does NOT auto-deploy — re-run this workflow from the Actions
# tab ("Run workflow") to publish the change.
#
# NOTE: Requires Pages Source = "GitHub Actions" (Settings -> Pages), not "Deploy
# from a branch". Re-running on an unchanged commit does not always purge the Pages
# CDN, so if a design switch doesn't appear live within a few minutes, push any
# commit to main to force a fresh build.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege permissions required to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let the latest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject active design
        env:
          ACTIVE_DESIGN: ${{ vars.ACTIVE_DESIGN || 'ink' }}
        run: |
          case "$ACTIVE_DESIGN" in
            ink|tech) ;;
            *) echo "::error::ACTIVE_DESIGN must be 'ink' or 'tech' (got '$ACTIVE_DESIGN')"; exit 1 ;;
          esac
          echo "Publishing with ACTIVE_DESIGN=$ACTIVE_DESIGN"
          # Rewrite the single source of truth in the pre-paint script...
          sed -i "s/var ACTIVE_DESIGN = '[a-z]*';/var ACTIVE_DESIGN = '$ACTIVE_DESIGN';/" index.html
          # ...and the no-JS fallback attribute on <html>.
          sed -i "s/\(<html[^>]*data-design=\"\)[a-z]*\"/\1$ACTIVE_DESIGN\"/" index.html
          echo "Result:"
          grep -n "var ACTIVE_DESIGN = " index.html
          grep -n "<html" index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
